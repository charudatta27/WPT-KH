<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            font-family: sans-serif;
        }
        body{
            background:linear-gradient(180deg,#676767,#f443f4);
        }
        #container{
            width: 450px;
            height: 400px;
            background-color:white;
            text-align: center;
          margin: 100px auto ;
          border-radius: 20px;




        }

        #container h1{
            padding-top: 30px;
        }

        .form-control{
            margin-bottom: 30px;
        }

        .form-control input{

            padding-top: 15px;
            padding-bottom: 15px;
            width: 65%;
            border: 0;
            border-bottom-width: 2px;
            border-bottom-color: aliceblue;
            outline: 0;
         }

         .form-control-button {
            padding-top: 15px;
            padding-bottom: 10px;
            width: 28%;
            background:linear-gradient(45deg,#673ab7,);
            background: white;
            border-color: #f443f4;
            color: blueviolet;

         }

         .form-control-button:hover{

         }
    </style>
</head>
<body>
    

      <div id="container">

        <h1>LogIn</h1>

        <form>
           <div class="form-control">
            <input type="text" placeholder="Enter Username">
            </div>

             <div class="form-control>
           <input type="password" placeholder="Enter the password">
            </div>

             <div class="form-control>
           <button type="submit">LogIn</button>
             </div>

    
        </form>

        <div>
        <p>Need Account <a href="#">Sign Up</a></p>
        </div>

      </div>




</body>
</html>
